<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Token Tracker</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 260px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f0f;
      color: #f0f0f0;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #22c55e;
      flex-shrink: 0;
    }

    h1 {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.04em;
      color: #f0f0f0;
    }

    .site-label {
      font-size: 10px;
      color: #666;
      margin-bottom: 10px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .stat-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 6px;
    }

    .stat-label {
      font-size: 11px;
      color: #888;
    }

    .stat-val {
      font-size: 13px;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
      color: #f0f0f0;
    }

    .track {
      width: 100%;
      height: 6px;
      background: rgba(255,255,255,0.08);
      border-radius: 3px;
      overflow: hidden;
      margin: 10px 0 14px;
    }

    .fill {
      height: 100%;
      background: #22c55e;
      border-radius: 3px;
      transition: width 0.5s ease, background 0.3s;
    }

    .divider {
      height: 1px;
      background: rgba(255,255,255,0.06);
      margin: 12px 0;
    }

    .note {
      font-size: 10px;
      color: #555;
      line-height: 1.5;
    }

    .no-data {
      font-size: 11px;
      color: #555;
      text-align: center;
      padding: 12px 0;
    }

    .version {
      font-size: 9px;
      color: #333;
      text-align: right;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="dot" id="status-dot"></div>
    <h1>Token Tracker</h1>
  </div>

  <div id="content">
    <p class="no-data">Open ChatGPT or Claude to see live token usage.</p>
  </div>

  <div class="version">v1.0.0</div>

  <script src="popup.js"></script>
</body>
</html>
