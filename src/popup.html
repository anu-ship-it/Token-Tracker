<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Token Tracker</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 300px;
      background: #0f0f0f;
      color: #f0f0f0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
    }
    .header {
      display: flex; align-items: center;
      justify-content: space-between;
      padding: 14px 16px 10px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .header-left { display: flex; align-items: center; gap: 8px; }
    .logo {
      width: 22px; height: 22px; border-radius: 6px;
      background: linear-gradient(135deg, #22c55e, #16a34a);
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 700; color: #fff;
    }
    .app-name { font-size: 13px; font-weight: 600; color: #f0f0f0; }
    .platform-badge {
      font-size: 10px; font-weight: 600; padding: 2px 7px;
      border-radius: 10px; letter-spacing: 0.04em;
    }
    .badge-claude  { background: rgba(214,107,51,0.2); color: #e8894a; }
    .badge-chatgpt { background: rgba(16,163,127,0.2); color: #19c37d; }
    .badge-none    { background: rgba(255,255,255,0.08); color: #888; }
    .donut-section {
      display: flex; align-items: center;
      gap: 16px; padding: 16px 16px 12px;
    }
    .donut-wrap { position: relative; width: 72px; height: 72px; flex-shrink: 0; }
    .donut-wrap svg { width: 72px; height: 72px; transform: rotate(-90deg); }
    .donut-center {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      pointer-events: none;
    }
    .donut-pct { font-size: 15px; font-weight: 700; line-height: 1; }
    .donut-sub { font-size: 9px; color: #555; margin-top: 2px; letter-spacing: 0.05em; }
    .stats-grid { flex: 1; display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .stat-card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 8px; padding: 8px 10px;
    }
    .stat-card .label { font-size: 10px; color: #555; letter-spacing: 0.04em; margin-bottom: 3px; text-transform: uppercase; }
    .stat-card .value { font-size: 14px; font-weight: 700; font-variant-numeric: tabular-nums; }
    .val-green  { color: #22c55e; }
    .val-yellow { color: #f59e0b; }
    .val-red    { color: #ef4444; }
    .val-white  { color: #f0f0f0; }
    .bar-section { padding: 0 16px 14px; }
    .bar-track { width: 100%; height: 5px; background: rgba(255,255,255,0.08); border-radius: 3px; overflow: hidden; }
    .bar-fill { height: 100%; border-radius: 3px; transition: width 0.5s ease, background 0.3s; }
    .bar-labels { display: flex; justify-content: space-between; margin-top: 5px; }
    .bar-labels span { font-size: 10px; color: #444; }
    .session-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 16px;
      border-top: 1px solid rgba(255,255,255,0.06);
    }
    .session-label { font-size: 10px; color: #444; }
    .session-val   { font-size: 10px; color: #777; }
    .history-section {
      padding: 10px 16px 14px;
      border-top: 1px solid rgba(255,255,255,0.06);
    }
    .history-title { font-size: 10px; color: #444; letter-spacing: 0.05em; text-transform: uppercase; margin-bottom: 8px; }
    .history-bars { display: flex; align-items: flex-end; gap: 3px; height: 30px; }
    .h-bar { flex: 1; border-radius: 2px; background: rgba(255,255,255,0.08); min-height: 3px; }
    .h-bar.green  { background: #22c55e; }
    .h-bar.yellow { background: #f59e0b; }
    .h-bar.red    { background: #ef4444; }
    .empty-state { padding: 28px 16px; text-align: center; }
    .empty-icon { font-size: 26px; margin-bottom: 8px; }
    .empty-text { font-size: 12px; color: #444; line-height: 1.55; }
    .footer {
      padding: 8px 16px; border-top: 1px solid rgba(255,255,255,0.04);
      display: flex; justify-content: space-between; align-items: center;
    }
    .footer-note { font-size: 10px; color: #2a2a2a; }
    .new-chat-btn {
      font-size: 10px; font-weight: 600; padding: 4px 10px;
      border-radius: 6px; background: rgba(34,197,94,0.12);
      color: #22c55e; border: 1px solid rgba(34,197,94,0.2);
      cursor: pointer; text-decoration: none; transition: background 0.15s;
      display: inline-block;
    }
    .new-chat-btn:hover { background: rgba(34,197,94,0.22); }
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="popup.js"></script>
</body>
</html>
