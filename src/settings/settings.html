<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Token Tracker — Settings</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #080808; color: #f0f0f0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh; display: flex;
      justify-content: center; padding: 40px 16px;
    }
    .container { width: 100%; max-width: 440px; }

    .back {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 12px; color: #444; margin-bottom: 28px;
      background: none; border: none; font-family: inherit;
      cursor: pointer; transition: color .15s;
    }
    .back:hover { color: #888; }

    h1 { font-size: 20px; font-weight: 700; color: #d0d0d0; margin-bottom: 6px; }
    .sub { font-size: 12px; color: #333; margin-bottom: 28px; }

    .section { margin-bottom: 22px; }
    .section-title {
      font-size: 10px; font-weight: 700;
      letter-spacing: .1em; color: #333;
      text-transform: uppercase; margin-bottom: 8px;
    }
    .card {
      background: #111111; border: 1px solid #1e1e1e;
      border-radius: 10px; overflow: hidden;
    }
    .row {
      display: flex; align-items: center;
      justify-content: space-between; padding: 13px 15px;
    }
    .row + .row { border-top: 1px solid #131313; }
0    .row-desc  { font-size: 11px; color: #333; margin-top: 2px; }

    /* Toggle */
    .toggle { position: relative; width: 40px; height: 22px; flex-shrink: 0; }
    .toggle input { opacity: 0; width: 0; height: 0; position: absolute; }
    .track {
      position: absolute; inset: 0;
      background: #1e1e1e; border-radius: 11px;
      cursor: pointer; transition: background .2s;
      border: 1px solid #2a2a2a;
    }
    .track::after {
      content: ""; position: absolute;
      width: 16px; height: 16px; border-radius: 50%;
      background: #444; top: 2px; left: 2px;
      transition: transform .2s, background .2s;
    }
    .toggle input:checked + .track { background: rgba(34,197,94,.15); border-color: rgba(34,197,94,.3); }
    .toggle input:checked + .track::after { transform: translateX(18px); background: #22c55e; }

    select {
      background: #1a1a1a; color: #777;
      border: 1px solid #1e1e1e; border-radius: 7px;
      padding: 6px 10px; font-size: 12px;
      font-family: inherit; cursor: pointer; outline: none;
    }

    .save-btn {
      width: 100%; padding: 13px;
      background: #22c55e; color: #000;
      border: none; border-radius: 10px;
      font-size: 13px; font-weight: 700;
      cursor: pointer; font-family: inherit;
      transition: opacity .15s; margin-top: 6px;
    }
    .save-btn:hover { opacity: .85; }
    .save-btn:active { transform: scale(.98); }

    .saved {
      text-align: center; font-size: 12px;
      color: #22c55e; margin-top: 10px;
      height: 16px; transition: opacity .3s;
    }
  </style>
</head>
<body>
  <div class="container">
    <button class="back" id="back-btn">← Back</button>
    <h1>Settings</h1>
    <p class="sub">Notifications and refresh configuration.</p>

    <div class="section">
      <div class="section-title">Notifications</div>
      <div class="card">
        <div class="row">
          <div>
            <div class="row-label">Alert at 70%</div>
            <div class="row-desc">Early warning</div>
          </div>
          <label class="toggle">
            <input type="checkbox" id="n70">
            <div class="track"></div>
          </label>
        </div>
        <div class="row">
          <div>
            <div class="row-label">Alert at 90%</div>
            <div class="row-desc">Critical warning</div>
          </div>
          <label class="toggle">
            <input type="checkbox" id="n90">
            <div class="track"></div>
          </label>
        </div>
        <div class="row">
          <div>
            <div class="row-label">Alert at 100%</div>
            <div class="row-desc">Limit reached</div>
          </div>
          <label class="toggle">
            <input type="checkbox" id="n100">
            <div class="track"></div>
          </label>
        </div>
      </div>
    </div>

    <div class="section">
      <div class="section-title">Display</div>
      <div class="card">
        <div class="row">
          <div>
            <div class="row-label">In-page token bar</div>
            <div class="row-desc">Show bar above input box</div>
          </div>
          <label class="toggle">
            <input type="checkbox" id="show_bar">
            <div class="track"></div>
          </label>
        </div>
      </div>
    </div>

    <div class="section">
      <div class="section-title">Refresh interval</div>
      <div class="card">
        <div class="row">
          <div>
            <div class="row-label">Fetch Claude usage every</div>
            <div class="row-desc">Background refresh frequency</div>
          </div>
          <select id="refresh">
            <option value="1">1 min</option>
            <option value="2">2 min</option>
            <option value="5">5 min</option>
            <option value="10">10 min</option>
            <option value="15">15 min</option>
          </select>
        </div>
      </div>
    </div>

    <button class="save-btn" id="save-btn">Save Settings</button>
    <div class="saved" id="saved" style="opacity:0">✓ Saved</div>
  </div>

  <script src="../lib/constants.js"></script>
  <script src="settings.js"></script>
</body>
</html>
